name: dnts_ims
description: DNTS Inventory Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.2
  camera: ^0.12.0+1
  google_generative_ai: ^0.4.7
  permission_handler: ^12.0.1
  flutter_dotenv: ^6.0.1
  flutter_displaymode: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/env
